<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERO ANALYZER ELITE - Group 4</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;900&display=swap');

        :root {
            --primary: #3b82f6;
            --bg: #01040a;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- 1. HIỆU ỨNG INTRO LOADING CHỈ 0.3 GIÂY --- */
        #loader-wrapper {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .loader-logo-big {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 15px;
            color: white;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.8);
        }

        .loaded #loader-wrapper {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .loaded body { overflow: auto; }

        /* --- 2. BACKGROUND & CANVAS --- */
        #bgCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.4; }

        /* --- 3. BRANDING --- */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .brand-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
            margin-bottom: 1rem;
        }

        .brand-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-align: center;
            line-height: 1.2;
        }

        /* --- 4. GIAO DIỆN CHÍNH --- */
        .glass-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 80px rgba(0,0,0,0.7);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease 0.2s;
        }

        .loaded .glass-container { opacity: 1; transform: translateY(0); }

        .btn-action {
            background: linear-gradient(to right, #2563eb, #3b82f6);
            transition: all 0.2s ease;
        }

        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-action:not(:disabled):hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="loader-wrapper">
        <div class="loader-logo-big">AERO</div>
        <div class="mt-4 flex gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.2s]"></div>
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.4s]"></div>
        </div>
    </div>

    <canvas id="bgCanvas"></canvas>

    <div class="max-w-xl w-full glass-container p-8 md:p-12 rounded-[3rem]">
        <div class="brand-container">
            <div class="brand-icon">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.7 5.2c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"></path>
                </svg>
            </div>
            <h2 class="brand-name">AERO<br><span class="text-blue-500">ANALYZER</span></h2>
            <p class="text-slate-500 text-[8px] uppercase tracking-[0.5em] mt-3 font-bold">Group 4 Intelligence</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="plane" placeholder="Nhập tên máy bay (VD: F-22)..." 
                class="w-full p-5 rounded-2xl bg-slate-900/90 border border-slate-800 text-white text-lg outline-none focus:border-blue-500 transition-all">
            
            <button onclick="analyze()" id="btn" 
                class="w-full text-white py-5 rounded-2xl font-bold text-md uppercase tracking-widest btn-action">
                <span id="btnText">EXECUTE ANALYSIS</span>
            </button>
        </div>

        <div id="resultContainer" class="mt-8 hidden">
            <div class="bg-black/50 rounded-2xl p-6 border border-white/5">
                <div id="result" class="text-slate-300 leading-relaxed text-md"></div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://delicate-breeze-66e2.2531510094.workers.dev";

        // Tắt màn hình load cực nhanh
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => document.body.classList.add('loaded'), 300);
        });

        // Hiệu ứng hạt nền
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dots = Array.from({length: 80}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2
            }));
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.s, 0, 7);
                ctx.fill();
                d.y -= 0.2; if (d.y < 0) d.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init);
        init(); draw();

        // Xử lý gọi API
        async function analyze() {
            const aircraft = document.getElementById('plane').value.trim();
            const resContainer = document.getElementById('resultContainer');
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btnText');

            if (!aircraft) return;

            btn.disabled = true;
            btnText.innerText = "ANALYZING...";
            resContainer.classList.add('hidden');

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    body: JSON.stringify({ aircraft })
                });
                const data = await response.json();
                resContainer.classList.remove('hidden');
                resDiv.innerText = data.choices?.[0]?.message?.content || "Lỗi phản hồi từ AI.";
            } catch (e) {
                resContainer.classList.remove('hidden');
                resDiv.innerText = "Lỗi kết nối Backend.";
            } finally {
                btn.disabled = false;
                btnText.innerText = "EXECUTE ANALYSIS";
            }
        }
    </script>
</body>
</html>
